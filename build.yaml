description: >
  Fetches posters, backdrops, logos and episode stills (with rating badges)
  from a self-hosted OpenPosterDB instance, by each library
  item's IMDb / TMDB / TVDB id. The base URL and API key are configurable, so
  it points at your own instance rather than a hosted service.
